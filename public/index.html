<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProfScout — Discover Professors, Match Research, Compare Stipends</title>
  <meta name="description" content="Open-source platform to discover 34,000+ CS professors, match research interests, compare PhD stipends, and generate personalized cold emails for PhD/MS applicants.">

  <!-- Icons / favicons -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <meta name="theme-color" content="#4f46e5">

  <!-- Social / link preview thumbnail -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="ProfScout — Discover Professors, Match Research, Compare Stipends">
  <meta property="og:description" content="Discover 34,000+ CS professors, match research interests, compare PhD stipends, and draft personalized outreach emails.">
  <meta property="og:image" content="assets/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ProfScout">
  <meta name="twitter:description" content="Discover Professors · Match Research · Compare Stipends">
  <meta name="twitter:image" content="assets/og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header" id="app-header">
      <div class="header-inner">
        <a href="#/" class="logo" id="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
            <path d="M12 3 22 7.5 12 12 2 7.5z"/>
            <path d="M6 9.6v3.9c0 1.4 2.7 2.5 6 2.5s6-1.1 6-2.5V9.6l-6 2.7z" opacity=".7"/>
            <path d="M22 7.5v5.2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
            <circle cx="22" cy="13.7" r="1.1"/>
          </svg>
          <span class="logo-text">Prof<span class="accent">Scout</span></span>
        </a>
        <nav class="nav" id="main-nav">
          <a href="#/discover" class="nav-link" data-page="discover" id="nav-discover">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88"/></svg> Discover
          </a>
          <a href="#/match" class="nav-link" data-page="match" id="nav-match">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Match
          </a>
          <a href="#/templates" class="nav-link" data-page="templates" id="nav-templates">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Templates
          </a>
          <a href="#/outbox" class="nav-link" data-page="outbox" id="nav-outbox">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Mail
          </a>
          <a href="#/tracker" class="nav-link" data-page="tracker" id="nav-tracker">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg> Tracker
          </a>
          <a href="#/stipends" class="nav-link" data-page="stipends" id="nav-stipends">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Stipends
          </a>
          <button id="theme-toggle" class="theme-toggle" title="Toggle Theme" aria-label="Toggle light/dark theme"></button>
        </nav>
        <div class="header-auth">
          <button id="google-signin-btn" class="btn btn-secondary btn-google" aria-label="Sign in with Google">
            <svg class="g-logo" width="16" height="16" viewBox="0 0 48 48" aria-hidden="true" focusable="false"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <span>Sign in with Google</span>
          </button>
        </div>
        <div class="header-stats" id="header-stats">
          <span class="sync-indicator" id="sync-indicator"></span>
          <span class="stat-badge" id="stat-professors">Loading...</span>
        </div>
        <div class="nav-settings">
          <a href="#" class="nav-link" id="nav-settings-btn">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Settings
          </a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Loading State -->
      <div class="loading-screen" id="loading-screen">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading 34,000+ professors...</p>
        <div class="loading-bar"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer" id="app-footer">
      <p>ProfScout &mdash; Open-source professor discovery platform. Data from
        <a href="https://csrankings.org" target="_blank" rel="noopener">CSrankings</a> &amp;
        <a href="https://csstipendrankings.org" target="_blank" rel="noopener">CSStipendRankings</a>
        (CC BY-NC-ND 4.0).
      </p>
    </footer>
  </div>

  <!-- Toasts — kept OUTSIDE #app so they stack above modals (root stacking context) -->
  <div class="toast-stack" id="toast-stack" aria-live="assertive" aria-atomic="false"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
