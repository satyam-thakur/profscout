<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProfScout — Discover Professors, Match Research, Compare Stipends</title>
  <meta name="description" content="Open-source platform to discover 34,000+ CS professors, match research interests, compare PhD stipends, and generate personalized cold emails for PhD/MS applicants.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header" id="app-header">
      <div class="header-inner">
        <a href="#/" class="logo" id="logo">
          <span class="logo-icon">&#9672;</span>
          <span class="logo-text">Prof<span class="accent">Scout</span></span>
        </a>
        <nav class="nav" id="main-nav">
          <a href="#/discover" class="nav-link" data-page="discover" id="nav-discover">
            <span class="nav-icon">&#128270;</span> Discover
          </a>
          <a href="#/tracker" class="nav-link" data-page="tracker" id="nav-tracker">
            <span class="nav-icon">&#128203;</span> Tracker
          </a>
          <a href="#/templates" class="nav-link" data-page="templates" id="nav-templates">
            <span class="nav-icon">&#128231;</span> Templates
          </a>
          <a href="#/stipends" class="nav-link" data-page="stipends" id="nav-stipends">
            <span class="nav-icon">&#128176;</span> Stipends
          </a>
          <a href="#/match" class="nav-link" data-page="match" id="nav-match">
            <span class="nav-icon">&#129517;</span> Match
          </a>
          <a href="#/outbox" class="nav-link" data-page="outbox" id="nav-outbox">
            <span class="nav-icon">&#128232;</span> Mail
          </a>
          <button id="theme-toggle" class="btn" style="background:transparent; border:none; box-shadow:none; font-size:1.4rem; padding:0 8px; cursor:pointer;" title="Toggle Theme">🌓</button>
        </nav>
        <div class="header-auth" style="margin-left:auto; margin-right: 1rem;">
          <button id="google-signin-btn" class="btn btn-secondary" style="display:flex; align-items:center; gap:0.5rem; padding: 6px 12px; font-size: 0.9rem; background: var(--bg-surface);">🔑 Sign in with Google</button>
        </div>
        <div class="header-stats" id="header-stats">
          <span class="stat-badge" id="stat-professors">Loading...</span>
        </div>
        <div class="nav-settings">
          <a href="#" class="nav-link" id="nav-settings-btn">
            <span class="nav-icon">&#9881;</span> Settings
          </a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Loading State -->
      <div class="loading-screen" id="loading-screen">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading 34,000+ professors...</p>
        <div class="loading-bar"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer" id="app-footer">
      <p>ProfScout &mdash; Open-source professor discovery platform. Data from
        <a href="https://csrankings.org" target="_blank" rel="noopener">CSrankings</a> &amp;
        <a href="https://csstipendrankings.org" target="_blank" rel="noopener">CSStipendRankings</a>
        (CC BY-NC-ND 4.0).
      </p>
    </footer>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
